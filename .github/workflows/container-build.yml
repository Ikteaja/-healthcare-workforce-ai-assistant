name: Container Build and Publish

on:
  push:
    branches:
      - main
      - feature/**

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/ikteaja/healthcare-backend:latest -f backend/Dockerfile .

      - name: Push Backend Image
        run: |
          docker push ghcr.io/ikteaja/healthcare-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/ikteaja/healthcare-frontend:latest -f frontend/Dockerfile .

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/ikteaja/healthcare-frontend:latest
