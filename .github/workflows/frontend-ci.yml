name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - 'requirements.txt'
  pull_request:
    paths:
      - 'frontend/**'
      - 'requirements.txt'

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate Streamlit App
        run: |
          python -m py_compile frontend/app.py
